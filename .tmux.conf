##### ─── Status Bar ───────────────────────────────────────────────────── #####

# Use vi keys in copy & command mode
set -g status-keys vi
set -g mode-keys vi

# Enable mouse
set -g mouse on

##### ─── Synchronize Panes ────────────────────────────────────────────── #####

# Toggle synchronized input across panes
bind e setw synchronize-panes on
bind E setw synchronize-panes off

##### ─── Status Bar ───────────────────────────────────────────────────── #####

set -g status-left-length 52
set -g status-right-length 451
set -g status-bg colour234
set -g status-fg white

# Catppuccin handles styling automatically
set -g @catppuccin_flavour 'mocha'

# Status bar setup 
set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-show-powerline true
set -g @tmux2k-window-list-alignment left
set -g @tmux2k-show-powerline false

# to show icons only
# set -g @tmux2k-icons-only true

# set the left and right plugin sections
set -g @tmux2k-left-plugins "session git"
set -g @tmux2k-right-plugins "ram cpu time"

# contorl refresh rate, applies to bandwidth, ping
set -g @tmux2k-refresh-rate 1

# to customize duo bg and fg
# set -g @tmux2k-duo-fg "#1688f0" # this will get you duo blue shown above
# set -g @tmux2k-duo-bg "#000000" # this will set the bg for duo theme

# to set powerline symbols
set -g @tmux2k-right-sep  # alternate right status bar sep
set -g @tmux2k-window-list-right-sep  # alternate window list right sep

##### ─── Window Navigation ────────────────────────────────────────────── #####

# Toggle between last two windows with Ctrl+A + A
bind-key a last-window

# Move between windows with Ctrl+Arrow keys
bind -n C-Right next-window
bind -n C-Left previous-window

##### ─── Reload Config ────────────────────────────────────────────────── #####

unbind r
bind r source-file ~/.tmux.conf \; display "✅ Reloaded tmux.conf!"

##### ─── Plugins (TPM) ────────────────────────────────────────────────── #####

# Initialize TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Catppuccin Mocha Theme (Dark)
set -g @plugin 'catppuccin/tmux'

# Yank integration (system clipboard)
set -g @plugin 'tmux-plugins/tmux-yank'

# Status bar
set -g @plugin '2kabhishek/tmux2k'

# Vim Tmux Navigator
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM (keep at the bottom)
run '~/.tmux/plugins/tpm/tpm'
