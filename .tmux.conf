##### General Settings #####

# Terminal colors
set -ga terminal-overrides ",xterm-256color:Tc"

# Detach client with Ctrl+D
bind-key ^D detach-client

# Use C-a as prefix (instead of default C-b)
unbind C-b
set -g prefix C-a
bind a send-prefix

# Window/pane indexing starts at 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# History size
set -g history-limit 10000

# Faster escape for vi mode
set -sg escape-time 50

##### Splits and Panes #####

# Create splits in current dir
bind-key v split-window -v -c "#{pane_current_path}"
bind-key h split-window -h -c "#{pane_current_path}"

# Resize panes with Shift + Ctrl + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Smart pane switching with vim awareness
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

##### Copy & Paste #####

# Use vi keys in copy and command mode
set -g status-keys vi
set -g mode-keys vi

# Enable mouse support
set -g mouse on

# Cross-platform clipboard (macOS, Linux, WSL)
# yanks selection into system clipboard
if-shell "uname | grep -qi darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "if-shell 'uname -r | grep -qi microsoft' \
    \"bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'\" \
    \"bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'\""

# Paste system clipboard with Prefix + p
if-shell "uname | grep -qi darwin" \
  "bind p run-shell 'pbpaste | tmux load-buffer - && tmux paste-buffer'" \
  "if-shell 'uname -r | grep -qi microsoft' \
    \"bind p run-shell 'powershell.exe Get-Clipboard | tmux load-buffer - && tmux paste-buffer'\" \
    \"bind p run-shell 'xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer'\""

##### Synchronize Panes #####

bind e setw synchronize-panes on
bind E setw synchronize-panes off

##### Status Bar #####

set -g status-left-length 52
set -g status-right-length 451
set -g status-fg white
set -g status-bg colour234
set -g status-left '#[fg=colour235,bg=colour252,bold] ❐ #S #[fg=colour252,bg=colour238,nobold] #[fg=colour245,bg=colour238,bold] #(whoami) #[fg=colour238,bg=colour234,nobold]'
set -g window-status-format "#[fg=colour235,bg=colour252,bold] #I #W "
set -g window-status-current-format "#[fg=colour234,bg=colour39] #[fg=black,bg=colour39,noreverse,bold] #I: #W #[fg=colour39,bg=colour234,nobold]"

##### Reload Config #####

unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

##### Plugins #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'macchiato'

run '~/.tmux/plugins/tpm/tpm'

